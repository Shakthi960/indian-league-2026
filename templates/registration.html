{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='registration.css') }}">

<section class="register-section">

<div class="container">

<h1>INDIAN LEAGUE 4 <span class="highlight">REGISTRATION</span></h1>

<form id="registerForm">
    <div class="form-grid">
        <input type="text" name="firstname" placeholder="First Name*" required>
        <input type="text" name="middlename" placeholder="Middle Name">
        <input type="text" name="lastname" placeholder="Last Name*" required>
        <input type="email" name="email" placeholder="Email ID*" required>
        <input type="tel" name="phone" id="phone" placeholder="Phone Number*" required>
        <input type="date" name="dob" id="dob" required>
        <input type="number" name="age" id="age" min="18" max="40" placeholder="Age*" required readonly>

        <select name="sport" id="sport" required>
            <option value="">Select Sport*</option>
            <option>Archery</option>
            <option>Athletics</option>
            <option>Badminton</option>
            <option>Basketball</option>
            <option>Beach Handball</option>
            <option>Beach Volleyball</option>
            <option>Boxing</option>
            <option>Carrom</option>
            <option>Chess</option>
            <option>Cricket</option>
            <option>Cycling</option>
            <option>Diving</option>
            <option>Fencing</option>
            <option>Football</option>
            <option>Handball</option>
            <option>Hockey</option>
            <option>Ice Hockey</option>
            <option>Judo</option>
            <option>Kabaddi</option>
            <option>Karate</option>
            <option>Kho Kho</option>
            <option>Rowing</option>
            <option>Shooting</option>
            <option>Speed Skating</option>
            <option>Squash</option>
            <option>Swimming</option>
            <option>Table Tennis</option>
            <option>Tennis</option>
            <option>Trampoline</option>
            <option>Volleyball</option>
            <option>Weightlifting</option>
            <option>Wrestling</option>
        </select>

        <select name="state" id="state" required>
            <option value="">Representing State*</option>
            </select>

        <div class="file-upload">
            <label>Passport Size Photo (Max 2MB)*</label>
            <input type="file" name="photo" id="photo" accept="image/*" required>
        </div>
    </div>
    <button class="next-btn">NEXT</button>
</form>



</div>

</section>


<script>
const allStates = [
    "Andaman & Nicobar",
    "Andhra Pradesh",
    "Arunachal Pradesh",
    "Assam",
    "Bihar",
    "Chandigarh",
    "Chhattisgarh",
    "Dadra & Nagar Haveli and Daman & Diu",
    "Delhi",
    "Goa",
    "Gujarat",
    "Haryana",
    "Himachal Pradesh",
    "Jammu & Kashmir",
    "Jharkhand",
    "Karnataka",
    "Kerala",
    "Ladakh",
    "Lakshadweep",
    "Madhya Pradesh",
    "Maharashtra",
    "Manipur",
    "Meghalaya",
    "Mizoram",
    "Nagaland",
    "Odisha",
    "Puducherry",
    "Punjab",
    "Rajasthan",
    "Sikkim",
    "Tamil Nadu",
    "Telangana",
    "Tripura",
    "Uttar Pradesh",
    "Uttarakhand",
    "West Bengal"
];

const sportSelect = document.getElementById("sport");
const stateSelect = document.getElementById("state");

function updateStates() {
    const selectedSport = sportSelect.value;

    const excludedStates = [
        "Andaman & Nicobar",
        "Chandigarh",
        "Dadra & Nagar Haveli and Daman & Diu",
        "Ladakh",
        "Lakshadweep",
        "Sikkim"
    ];

    stateSelect.innerHTML = '<option value="">Representing State*</option>';

    allStates.forEach(state => {
        const isExcludedSport = (selectedSport === "Football" || selectedSport === "Kabaddi");
        const isExcludedState = excludedStates.includes(state);

        if (!(isExcludedSport && isExcludedState)) {
            const option = document.createElement("option");
            option.value = state;
            option.textContent = state;
            stateSelect.appendChild(option);
        }
    });
}

// Trigger when sport changes
sportSelect.addEventListener("change", updateStates);

// Load initially
updateStates();
</script>

<script>
document.getElementById("dob").addEventListener("change", function() {
    let dob = new Date(this.value);
    let today = new Date();

    let age = today.getFullYear() - dob.getFullYear();
    let m = today.getMonth() - dob.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
        age--;
    }

    document.getElementById("age").value = age;
});
</script>

<script>
/* Form Submit → Backend */
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const age = document.getElementById("age").value;
    const phone = document.getElementById("phone").value;
    const fileInput = document.getElementById("photo");

    if (age < 18 || age > 40) {
        alert("Age must be between 18 and 40");
        return;
    }

    if (!/^[0-9]{10}$/.test(phone)) {
        alert("Enter valid 10 digit phone number");
        return;
    }

    const file = fileInput.files[0];
    if (!file) {
        alert("Please upload photo");
        return;
    }

    if (file.size > 2 * 1024 * 1024) {
        alert("Photo must be less than 2MB");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function() {

        const data = {
            firstname: document.querySelector("[name='firstname']").value,
            middlename: document.querySelector("[name='middlename']").value,
            lastname: document.querySelector("[name='lastname']").value,
            email: document.querySelector("[name='email']").value,
            phone: phone,
            dob: document.getElementById("dob").value,
            age: age,
            state: document.getElementById("state").value,
            sport: document.getElementById("sport").value,
            photo: reader.result
        };

        try {
            const res = await fetch("/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (result.status === "success") {

                alert("Registration Successful\nApplication ID: " + result.application_id);

                // 🔥 redirect to backend preview
                window.location = "/preview/" + result.application_id;

            } else if (result.status === "duplicate") {
                alert("Duplicate registration not allowed");
            } else if (result.status === "phone_limit") {
                alert("Phone number already used for 10 registrations");
            } else if (result.status === "email_limit") {
                alert("Email already used for 10 registrations");
            } else {
                alert("Registration failed");
            }

        } catch (err) {
            alert("Server error. Please try again.");
        }

    };

    reader.readAsDataURL(file);
});
</script>

{% endblock %}
