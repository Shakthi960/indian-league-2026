{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<section class="admin-section">
    <div class="admin-container">
        <h1>Points Table</h1>

        <table border="1" id="pointsTable">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Matches</th>
                    <th>Wins</th>
                    <th>Loss</th>
                    <th>Points</th>
                    <th>NRR</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" style="text-align:center;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<script>
const regions = ["north","south","east","west","center"];

async function loadPoints() {

    const res = await fetch("/get_points");
    const data = await res.json();

    const container = document.querySelector(".admin-container");
    container.innerHTML = "<h1>Regional Points Table</h1>";

    let topTeams = [];

    regions.forEach(region => {

        let teams = data.teams.filter(t => t.region === region);

        if (teams.length === 0) return;

        let html = `
        <div class="region-box">
        <h2>${region.toUpperCase()}</h2>
        <table class="regionTable">
        <tr>
            <th>Team</th><th>M</th><th>W</th><th>L</th><th>P</th><th>NRR</th>
        </tr>`;

        teams.forEach((t,i) => {
            if(i===0) topTeams.push(t);

            html += `
            <tr class="${i===0 ? 'top-team' : ''}">
                <td>${t.name}</td>
                <td>${t.matches}</td>
                <td>${t.wins}</td>
                <td>${t.loss}</td>
                <td>${t.points}</td>
                <td>${t.nrr.toFixed(2)}</td>
            </tr>`;
        });

        html += "</table></div>";
        container.innerHTML += html;
    });

    // 🔥 Quarter Final Table
    renderQuarter(topTeams);
}

function renderQuarter(teams){

    if(teams.length < 5) return;

    let html = `<h2>Quarter Final Round</h2>
    <table class="regionTable">`;

    teams.forEach((t,i)=>{
        html += `<tr><td>${i+1}</td><td>${t.name}</td></tr>`;
    });

    html += "</table>";

    document.querySelector(".admin-container").innerHTML += html;
}

document.addEventListener("DOMContentLoaded", loadPoints);
</script>
{% endblock %}
