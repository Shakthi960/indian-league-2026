{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<section class="admin-section">
    <div class="admin-container" id="mainContainer">
        <h1>Points Table</h1>
        <p style="text-align:center;">Loading...</p>
    </div>
</section>

<script>
const regions = ["north","south","east","west","center"];

async function loadPoints() {

    const res = await fetch("/get_points");
    const data = await res.json();

    const container = document.getElementById("mainContainer");

    let html = `<h1>Regional Points Table</h1><div class="grid">`;

    let topTeams = [];

    regions.forEach(region => {

        let teams = data.teams
            .filter(t => t.region === region)
            .sort((a,b)=> b.points - a.points || b.nrr - a.nrr);

        if (teams.length === 0) return;

        html += `
        <div class="region-box">
            <h2>${region.toUpperCase()}</h2>
            <table class="regionTable">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>M</th>
                        <th>W</th>
                        <th>L</th>
                        <th>P</th>
                        <th>NRR</th>
                    </tr>
                </thead>
                <tbody>
        `;

        teams.forEach((t,i) => {

            if(i === 0) topTeams.push(t);

            html += `
            <tr class="${i===0 ? 'top-team' : ''}">
                <td>${t.name}</td>
                <td>${t.matches}</td>
                <td>${t.wins}</td>
                <td>${t.loss}</td>
                <td>${t.points}</td>
                <td>${t.nrr.toFixed(2)}</td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
    });

    html += `</div>`;

    // 🔥 Knockout section
    html += renderKnockout(topTeams);

    container.innerHTML = html;
}

function renderKnockout(teams){

    if(teams.length < 5){
        return `<p style="text-align:center;margin-top:20px;">Not enough teams for knockout</p>`;
    }

    teams.sort((a,b)=> b.points - a.points || b.nrr - a.nrr);

    let t1 = teams[0];
    let t2 = teams[1];
    let t3 = teams[2];
    let t4 = teams[3];
    let t5 = teams[4];

    return `
    <div class="knockout">

        <h2 style="text-align:center;">🏆 Knockout Stage</h2>

        <h3>Quarter Finals</h3>
        <div class="match-box">${t1.name} vs ${t2.name}</div>
        <div class="match-box">${t3.name} vs ${t4.name}</div>
        <div class="match-box">Loser QF1 vs ${t5.name}</div>

        <h3>Semi Finals</h3>
        <div class="match-box">Winner QF1 vs Winner QF2</div>
        <div class="match-box">Winner QF3 vs Loser SF1</div>

        <h3>Final</h3>
        <div class="match-box final">Winner SF1 vs Winner SF2</div>

    </div>`;
}

document.addEventListener("DOMContentLoaded", loadPoints);
</script>

{% endblock %}
