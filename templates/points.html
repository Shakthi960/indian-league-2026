{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<section class="admin-section">
    <div class="admin-container">
        <h1>Points Table</h1>

        <table border="1" id="pointsTable">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Matches</th>
                    <th>Wins</th>
                    <th>Loss</th>
                    <th>Points</th>
                    <th>NRR</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" style="text-align:center;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<script>
async function loadPoints() {
    const tbody = document.querySelector("#pointsTable tbody");

    try {
        const res = await fetch("/get_points");
        const data = await res.json();

        tbody.innerHTML = "";

        if (!data.teams || data.teams.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center;">No data available</td>
                </tr>`;
            return;
        }

        data.teams.forEach(team => {
            tbody.innerHTML += `
            <tr>
                <td data-label="Team">${team.name}</td>
                <td data-label="Matches">${team.matches}</td>
                <td data-label="Wins">${team.wins}</td>
                <td data-label="Loss">${team.loss}</td>
                <td data-label="Points">${team.points}</td>
                <td data-label="NRR">${Number(team.nrr).toFixed(2)}</td>
            </tr>`;
        });

    } catch (err) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center;">Server error</td>
            </tr>`;
    }
}

document.addEventListener("DOMContentLoaded", loadPoints);
</script>

{% endblock %}
