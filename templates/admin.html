{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<section class="admin-section">

<div class="admin-container">

<div class="admin-header">

<h1>INDIAN LEAGUE 4 - ADMIN DASHBOARD</h1>

<a href="/logout" class="logout-btn">Logout</a>

</div>

<table class="admin-table">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>State</th>
<th>Sport</th>
</tr>

</thead>

<tbody id="playersTable">

<tr>
<td colspan="5" class="loading">Loading players...</td>
</tr>

</tbody>

</table>

</div>

</section>


<script>

async function loadPlayers(){

try{

const res = await fetch("/get_players")
const data = await res.json()

const tableBody = document.getElementById("playersTable")

if(!data.players || data.players.length === 0){

tableBody.innerHTML = `
<tr>
<td colspan="5">No players registered yet.</td>
</tr>
`
return
}

let rows = ""

data.players.forEach(p => {

rows += `

<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.phone}</td>
<td>${p.state}</td>
<td>${p.sport}</td>

</tr>

`

})

tableBody.innerHTML = rows

}catch(err){

document.getElementById("playersTable").innerHTML = `
<tr>
<td colspan="5">Failed to load players.</td>
</tr>
`

}

}

document.addEventListener("DOMContentLoaded", loadPlayers)

</script>

{% endblock %}
