{% extends "base.html" %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<section class="admin-section">
    <div class="admin-container">
        <div class="admin-header">
            <h1>ADMIN DASHBOARD</h1>
            <div class="header-actions">
                <button onclick="downloadExcel()" class="download-btn">Export Excel</button>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="tab">
  <button onclick="openTab('nrrTab')">NRR Calculator</button>
  <button onclick="openTab('playersTab')">Players Info</button>
</div>

<!-- NRR TAB -->
<div id="nrrTab" class="tab-content">

  <div class="nrr-box">
    <h2>NRR Calculator</h2>

    <div class="team-box">
      <h3>Team A</h3>
      <input type="text" id="teamA" placeholder="Team Name">
      <input type="number" id="runsA" placeholder="Runs">
      <input type="number" id="oversA" placeholder="Overs (max 10)">
      <input type="number" id="wicketsA" placeholder="Wickets">
    </div>

    <div class="team-box">
      <h3>Team B</h3>
      <input type="text" id="teamB" placeholder="Team Name">
      <input type="number" id="runsB" placeholder="Runs">
      <input type="number" id="oversB" placeholder="Overs (max 10)">
      <input type="number" id="wicketsB" placeholder="Wickets">
    </div>

    <button class="calculate-btn" onclick="calculateMatch()">Calculate & Save</button>

    <h3 id="result"></h3>
  </div>

  <!-- MATCH HISTORY -->
  <div class="history-box">
    <h2>Match History</h2>
    <table id="historyTable">
      <thead>
        <tr>
          <th>Match</th>
          <th>Result</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<!-- PLAYERS TAB -->
<div id="playersTab" class="tab-content">

        <div class="filter-bar">
            <div class="filter-group">
                <label>State / UT:</label>
                <select id="stateFilter" onchange="applyFilters()">
                    <option value="all">All India (36 States/UTs)</option>
                    <optgroup label="States">
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                        <option value="Assam">Assam</option>
                        <option value="Bihar">Bihar</option>
                        <option value="Chhattisgarh">Chhattisgarh</option>
                        <option value="Goa">Goa</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Manipur">Manipur</option>
                        <option value="Meghalaya">Meghalaya</option>
                        <option value="Mizoram">Mizoram</option>
                        <option value="Nagaland">Nagaland</option>
                        <option value="Odisha">Odisha</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Sikkim">Sikkim</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Tripura">Tripura</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Uttarakhand">Uttarakhand</option>
                        <option value="West Bengal">West Bengal</option>
                    </optgroup>
                    <optgroup label="Union Territories">
                        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                        <option value="Chandigarh">Chandigarh</option>
                        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                        <option value="Ladakh">Ladakh</option>
                        <option value="Lakshadweep">Lakshadweep</option>
                        <option value="Puducherry">Puducherry</option>
                    </optgroup>
                </select>
            </div>

            <div class="filter-group">
                <label>Sport:</label>
                <select id="sportFilter" onchange="applyFilters()">
                    <option value="all">All 32 Sports</option>
                    <option value="Cricket">Cricket</option>
                    <option value="Football">Football</option>
                    <option value="Kabaddi">Kabaddi</option>
                    <option value="Archery">Archery</option>
                    <option value="Athletics">Athletics</option>
                    <option value="Badminton">Badminton</option>
                    <option value="Basketball">Basketball</option>
                    <option value="Beach Handball">Beach Handball</option>
                    <option value="Beach Volleyball">Beach Volleyball</option>
                    <option value="Boxing">Boxing</option>
                    <option value="Carrom">Carrom</option>
                    <option value="Chess">Chess</option>
                    <option value="Cycling">Cycling</option>
                    <option value="Diving">Diving</option>
                    <option value="Fencing">Fencing</option>
                    <option value="Handball">Handball</option>
                    <option value="Hockey">Hockey</option>
                    <option value="Ice Hockey">Ice Hockey</option>
                    <option value="Judo">Judo</option>
                    <option value="Karate">Karate</option>
                    <option value="Kho Kho">Kho Kho</option>
                    <option value="Rowing">Rowing</option>
                    <option value="Shooting">Shooting</option>
                    <option value="Speed Skating">Speed Skating</option>
                    <option value="Squash">Squash</option>
                    <option value="Swimming">Swimming</option>
                    <option value="Table Tennis">Table Tennis</option>
                    <option value="Tennis">Tennis</option>
                    <option value="Trampoline">Trampoline</option>
                    <option value="Volleyball">Volleyball</option>
                    <option value="Weightlifting">Weightlifting</option>
                    <option value="Wrestling">Wrestling</option>
                </select>
            </div>

            <div class="stats-box">
                COUNT: <span id="playerCount">0</span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="admin-table" id="exportTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>State</th>
                        <th>Sport</th>
                    </tr>
                </thead>
                <tbody id="playersTable">
                    <tr>
                        <td colspan="5" class="loading">Loading players...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<script>
/* =========================
   PLAYERS TABLE (EXISTING)
========================= */
let allPlayers = [];

async function loadPlayers() {
    try {
        const res = await fetch("/get_players");
        const data = await res.json();
        allPlayers = data.players || [];
        renderPlayersTable(allPlayers);
    } catch (err) {
        document.getElementById("playersTable").innerHTML =
            `<tr><td colspan="5">Server Error</td></tr>`;
    }
}

function applyFilters() {
    const state = document.getElementById("stateFilter").value;
    const sport = document.getElementById("sportFilter").value;

    const filtered = allPlayers.filter(p => {
        return (state === "all" || p.state === state) &&
               (sport === "all" || p.sport === sport);
    });

    renderPlayersTable(filtered);
}

function renderPlayersTable(data) {
    const tableBody = document.getElementById("playersTable");
    document.getElementById("playerCount").innerText = data.length;

    if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5">No players found.</td></tr>`;
        return;
    }

    tableBody.innerHTML = data.map(p => `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.phone}</td>
            <td>${p.state}</td>
            <td>${p.sport}</td>
        </tr>
    `).join('');
}

/* =========================
   EXCEL EXPORT
========================= */
function downloadExcel() {
    const table = document.getElementById("exportTable");
    const wb = XLSX.utils.table_to_book(table, { sheet: "Participants" });
    const date = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `IL4_Participants_${date}.xlsx`);
}

/* =========================
   TABS SYSTEM
========================= */
function openTab(tabId) {
    document.querySelectorAll(".tab-content").forEach(tab => {
        tab.style.display = "none";
    });
    document.getElementById(tabId).style.display = "block";
}

/* =========================
   CALCULATE MATCH (BACKEND)
========================= */
async function calculateMatch() {

    let teamA = document.getElementById("teamA").value.trim();
    let teamB = document.getElementById("teamB").value.trim();

    let runsA = document.getElementById("runsA").value;
    let oversA = document.getElementById("oversA").value;

    let runsB = document.getElementById("runsB").value;
    let oversB = document.getElementById("oversB").value;

    if (!teamA || !teamB || !runsA || !runsB || !oversA || !oversB) {
        alert("Please fill all fields");
        return;
    }

    const btn = document.querySelector(".calculate-btn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    try {
        const res = await fetch("/save_match", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                teamA,
                teamB,
                runsA,
                runsB,
                oversA,
                oversB
            })
        });

        const result = await res.json();

        if (result.status === "success") {

            let nrrA = (runsA / oversA) - (runsB / oversB);
            let nrrB = -nrrA;

            document.getElementById("result").innerText =
                `${teamA} NRR: ${nrrA.toFixed(2)} | ${teamB} NRR: ${nrrB.toFixed(2)}`;

            alert("Match Saved Successfully ✅");

        } else {
            alert("Error saving match");
        }

    } catch (err) {
        alert("Server error");
    }

    btn.disabled = false;
    btn.innerText = "Calculate & Save";
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", () => {
    loadPlayers();
    openTab("nrrTab");
});
</script>
{% endblock %}
