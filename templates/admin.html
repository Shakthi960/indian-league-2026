#matchTable {

    text-align: center;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.5px;
}

    padding: 12px;

    color: #e0f7fa;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* HOVER EFFECT */
#matchTable tbody tr:hover {
    background: #112240;
    transition: 0.2s;
}

/* ZEBRA STRIPES */
#matchTable tbody tr:nth-child(even) {
    background: #091426;
}

/* DELETE BUTTON */
#matchTable button {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(90deg, #ff4d4d, #cc0000);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
}

/* BUTTON HOVER */
#matchTable button:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg, #ff1a1a, #990000);
}

/* EMPTY STATE */
#matchTable tbody:empty::after {
    content: "No matches available";
    display: block;
    padding: 20px;
    text-align: center;
    color: #aaa;
}

/* GLASS EFFECT (optional but nice) */
#matchTable {
    backdrop-filter: blur(8px);
}

<script>
/* =========================
   PLAYERS TABLE (EXISTING)
========================= */
let allPlayers = [];

async function loadPlayers() {
    try {
        const res = await fetch("/get_players");
        const data = await res.json();
        allPlayers = data.players || [];
        renderPlayersTable(allPlayers);
    } catch (err) {
        document.getElementById("playersTable").innerHTML =
            `<tr><td colspan="5">Server Error</td></tr>`;
    }
}

function applyFilters() {
    const state = document.getElementById("stateFilter").value;
    const sport = document.getElementById("sportFilter").value;

    const filtered = allPlayers.filter(p => {
        return (state === "all" || p.state === state) &&
               (sport === "all" || p.sport === sport);
    });

    renderPlayersTable(filtered);
}

function renderPlayersTable(data) {
    const tableBody = document.getElementById("playersTable");
    document.getElementById("playerCount").innerText = data.length;

    if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5">No players found.</td></tr>`;
        return;
    }

    tableBody.innerHTML = data.map(p => `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.phone}</td>
            <td>${p.state}</td>
            <td>${p.sport}</td>
        </tr>
    `).join('');
}

/* =========================
   EXCEL EXPORT
========================= */
function downloadExcel() {
    const table = document.getElementById("exportTable");
    const wb = XLSX.utils.table_to_book(table, { sheet: "Participants" });
    const date = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `IL4_Participants_${date}.xlsx`);
}

/* =========================
   TABS SYSTEM
========================= */
function openTab(tabId) {
    document.querySelectorAll(".tab-content").forEach(tab => {
        tab.style.display = "none";
    });
    document.getElementById(tabId).style.display = "block";
}

/* =========================
   CALCULATE MATCH (BACKEND)
========================= */
async function calculateMatch() {

    let teamA = document.getElementById("teamA").value.trim();
    let teamB = document.getElementById("teamB").value.trim();

    let runsA = document.getElementById("runsA").value;
    let oversA = document.getElementById("oversA").value;

    let runsB = document.getElementById("runsB").value;
    let oversB = document.getElementById("oversB").value;

    let stateA = document.getElementById("stateA").value;
    let stateB = document.getElementById("stateB").value;

    // VALIDATION
    if (oversA.includes('.') && oversA.split('.')[1] > 5) {
        alert("Invalid overs A (max .5)");
        return;
    }

    if (oversB.includes('.') && oversB.split('.')[1] > 5) {
        alert("Invalid overs B (max .5)");
        return;
    }

    if (!teamA || !teamB || !runsA || !runsB || !oversA || !oversB) {
        alert("Please fill all fields");
        return;
    }

    if (!stateA || !stateB) {
        alert("Please select states for both teams");
        return;
    }

    const btn = document.querySelector(".calculate-btn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    try {
        const res = await fetch("/save_match", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                teamA,
                teamB,
                runsA,
                runsB,
                oversA,
                oversB,
                stateA,
                stateB
            })
        });

        const result = await res.json();

        if (result.status === "success") {

            function convertOvers(overs) {
                overs = overs.toString();
                if (overs.includes(".")) {
                    let parts = overs.split(".");
                    return parseInt(parts[0]) + (parseInt(parts[1]) / 6);
                }
                return parseFloat(overs);
            }

            let oA = convertOvers(oversA);
            let oB = convertOvers(oversB);

            let nrrA = (runsA / oA) - (runsB / oB);
            let nrrB = -nrrA;

            document.getElementById("result").innerText =
                `${teamA} NRR: ${nrrA.toFixed(2)} | ${teamB} NRR: ${nrrB.toFixed(2)}`;

            alert("Match Saved Successfully ✅");

        } else {
            alert(result.message || "Error saving match");
        }

    } catch (err) {
    alert("Server error");
    } finally {
        btn.disabled = false;
        btn.innerText = "Calculate & Save";
    }

    btn.disabled = false;
    btn.innerText = "Calculate & Save";
}

async function loadTeams(){
    const res = await fetch("/get_points");
    const data = await res.json();

    const table = document.querySelector("#teamsTable tbody");

    table.innerHTML = data.teams.map(t => `
        <tr>
            <td>${t.name}</td>
            <td>${t.region}</td>
            <td>${t.points}</td>
            <td>
                <button onclick="deleteTeam('${t.name}')">Delete</button>
            </td>
        </tr>
    `).join('');
}

async function deleteTeam(name){
    if(!confirm("Delete " + name + "?")) return;

    const res = await fetch("/delete_team", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
    });

    const result = await res.json();

    if(result.status === "success"){
        alert("Deleted ✅");
        loadTeams();
    }else{
        alert("Delete failed");
    }
}

document.addEventListener("DOMContentLoaded", () => {
    loadPlayers();
    loadTeams();
    loadMatches();   // 👈 ADD THIS
    openTab("nrrTab");
});


async function loadMatches(){
    const res = await fetch("/get_matches");
    const data = await res.json();

    const table = document.querySelector("#matchTable tbody");

    table.innerHTML = data.matches.map(m => `
        <tr>
            <td>${m.id}</td>
            <td>${m.teamA} vs ${m.teamB}</td>
            <td>
                <button onclick="deleteMatch(${m.id})">Delete</button>
            </td>
        </tr>
    `).join('');
}


async function deleteMatch(id){
    if(!confirm("Delete this match?")) return;

    const res = await fetch("/delete_match", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id })
    });

    const result = await res.json();

    if(result.status === "success"){
        alert("Deleted ✅");
        loadMatches();
    }else{
        alert("Delete failed");
    }
}

</script>
